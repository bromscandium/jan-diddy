name: CI/CD Deploy
on:
  push:
    branches: [ master, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Ruff lint
        run: poetry run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Run Tests (Pytest)
        run: poetry run pytest
        env:
          BOT_TOKEN: "123456:ABC-DEF"
          WEATHER_API_KEY: "dummy"
          CHAT_ID: "0"
          ADMIN_CHAT_ID: "0"
          ADMIN_IDS: "[0]"
          REACTIONS: "[]"
          SEMESTER_START: "2026-01-01"
          CHAT_LINK: "https://t.me/dummy"
          DATABASE_URL: "postgresql://u:p@localhost:5432/db"

  deploy:
    runs-on: ubuntu-latest
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Railway
        run: |
          bun add -g @railway/cli
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
